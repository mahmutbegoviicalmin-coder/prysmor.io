# Build Windows (.exe) + macOS (.pkg) installers and attach to GitHub Release v2.6.3
name: Build installers

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows:
    name: windows
    runs-on: windows-latest
    steps:
      - name: Checkout (with Git LFS)
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install NSIS
        run: choco install nsis -y

      - name: Compile NSIS installer
        shell: pwsh
        run: |
          $makensis = "${env:ProgramFiles(x86)}\NSIS\makensis.exe"
          if (-not (Test-Path $makensis)) { $makensis = "$env:ProgramFiles\NSIS\makensis.exe" }
          if (-not (Test-Path $makensis)) { throw "makensis not found after choco install nsis" }
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          & $makensis "prysmor-panel\installer\windows\installer.nsi"
          if (-not (Test-Path "dist\PrysmrSetup.exe")) { throw "dist\PrysmrSetup.exe not produced" }
          Get-Item "dist\PrysmrSetup.exe" | Format-List Name, Length

      - name: Upload windows-installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/PrysmrSetup.exe

  macos:
    name: macos
    runs-on: macos-latest
    steps:
      - name: Checkout (with Git LFS)
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Build macOS .pkg
        run: |
          chmod +x prysmor-panel/installer/build-mac-pkg.sh
          bash prysmor-panel/installer/build-mac-pkg.sh
          test -f dist/Prysmor-2.6.3.pkg
          ls -lh dist/Prysmor-2.6.3.pkg

      - name: Upload mac-installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-installer
          path: dist/Prysmor-2.6.3.pkg

  release:
    name: release
    needs: [windows, macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: assets

      - name: Create or update GitHub Release v2.6.3
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          WIN="assets/windows-installer/PrysmrSetup.exe"
          MAC="assets/mac-installer/Prysmor-2.6.3.pkg"
          test -f "$WIN"
          test -f "$MAC"
          TAG="v2.6.3"
          REPO="${GITHUB_REPOSITORY}"

          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            echo "Release $TAG exists — uploading / replacing assets"
            gh release upload "$TAG" "$WIN" "$MAC" --repo "$REPO" --clobber
          else
            echo "Creating release $TAG"
            gh release create "$TAG" "$WIN" "$MAC" \
              --repo "$REPO" \
              --title "Prysmor Panel $TAG" \
              --notes "Built by GitHub Actions — Windows (PrysmrSetup.exe) + macOS (Prysmor-2.6.3.pkg)."
          fi

          echo ""
          echo "=== Download URLs ==="
          OWNER="${GITHUB_REPOSITORY%%/*}"
          NAME="${GITHUB_REPOSITORY#*/}"
          echo "https://github.com/${OWNER}/${NAME}/releases/download/${TAG}/PrysmrSetup.exe"
          echo "https://github.com/${OWNER}/${NAME}/releases/download/${TAG}/Prysmor-2.6.3.pkg"
