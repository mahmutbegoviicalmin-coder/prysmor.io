<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body {
    font-family: -apple-system, "Helvetica Neue", sans-serif;
    margin: 0; padding: 24px 28px;
    color: #1d1d1f; background: #fff;
  }
  h1 { font-size: 22px; font-weight: 700; margin: 0 0 10px; letter-spacing: -0.3px; color: #1d7a3a; }
  p  { font-size: 13px; line-height: 1.6; color: #444; margin: 0 0 10px; }
  ol { font-size: 13px; line-height: 1.8; color: #444; padding-left: 18px; }
  code { font-family: "SF Mono", Menlo, monospace; background: #f2f2f2; padding: 1px 5px; border-radius: 4px; }
</style>
</head>
<body>
  <h1>Installation Complete</h1>
  <p>Prysmor has been installed successfully.</p>
  <p><strong>To open the panel in Premiere Pro:</strong></p>
  <ol>
    <li>Restart Adobe Premiere Pro</li>
    <li>Go to <strong>Window → Extensions → Prysmor</strong></li>
    <li>Sign in with your Prysmor account at <strong>prysmor.io</strong></li>
  </ol>
  <p>If the panel does not appear, restart Premiere Pro once more.</p>
</body>
</html>
